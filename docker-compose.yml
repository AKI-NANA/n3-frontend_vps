version: '3.8'

services:
  n3-app:
    build: .
    container_name: n3-app
    restart: always
    env_file:
      - .env.docker
    networks:
      - n3-network

  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - WEBHOOK_URL=http://160.16.120.186:5678
      - GENERIC_TIMEZONE=Asia/Tokyo
      - N3_API_URL=http://n3-app:3000
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - n3-network

networks:
  n3-network:
    driver: bridge

volumes:
  n8n-data:
